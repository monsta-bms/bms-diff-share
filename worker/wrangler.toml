name = "bms-wip-charts-worker"
main = "src/index.ts"
compatibility_date = "2026-06-28"
workers_dev = true

[vars]
# Deploy前にGitHub Pagesなどの実際のフロントURLへ変更する。
ALLOWED_ORIGIN = "http://localhost:8787"

[[d1_databases]]
binding = "DB"
database_name = "wip-bms-charts-db"
database_id = "d55ed399-5a31-43a0-89d4-9bd2f32ba3a7"

[[r2_buckets]]
binding = "FILES"
bucket_name = "wip-bms-charts-files"

# 秘密情報はこのファイルに書かず、Cloudflare secrets で設定する。
# 想定secret:
# - HASH_SECRET
# - ADMIN_TOKEN
