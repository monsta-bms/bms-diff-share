<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BMS差分共有</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div>
          <p class="site-label">BMS WIP Charts</p>
          <h1>BMS差分共有</h1>
        </div>
      </header>

      <main>
        <section class="notice" id="errorBox" role="alert" aria-live="polite" hidden></section>

        <section class="panel submit-panel" aria-labelledby="submitTitle">
          <div class="section-heading">
            <h2 id="submitTitle">投稿フォーム</h2>
            <span class="version-badge">初回投稿 ver1.0</span>
          </div>

          <form id="chartForm" novalidate>
            <p class="required-note"><span class="required-mark">*</span>項目は入力必須。</p>

            <div class="form-grid">
              <label class="field field-wide">
                <span class="field-label">譜面ファイル <span class="required-mark">*</span></span>
                <input id="chartFile" name="file" type="file" accept=".bms,.bme,.bml,.zip" required>
                <span class="field-help">対応形式: .bms / .bme / .bml / .zip。音源ファイルはアップロードできません。</span>
              </label>

              <label class="field">
                <span class="field-label">曲名 <span class="required-mark">*</span></span>
                <input id="title" name="title" type="text" autocomplete="off" placeholder="一致していない場合修正してください。" required>
              </label>

              <label class="field">
                <span class="field-label">サブタイトル</span>
                <input id="subtitle" name="subtitle" type="text" autocomplete="off">
              </label>

              <label class="field">
                <span class="field-label">アーティスト <span class="required-mark">*</span></span>
                <input id="artist" name="artist" type="text" autocomplete="off" placeholder="一致していない場合修正してください。" required>
              </label>

              <label class="field">
                <span class="field-label">サブアーティスト</span>
                <input id="subartist" name="subartist" type="text" autocomplete="off">
              </label>

              <label class="field">
                <span class="field-label">仮差分名 <span class="required-mark">*</span></span>
                <input id="chartName" name="chartName" type="text" autocomplete="off" placeholder="例: [ANOTHER] / [ALITHER] / 仮差分" required>
                <span class="field-help">同じ曲の別差分を区別するための名前です。</span>
              </label>

              <div class="field difficulty-field">
                <span class="field-label">想定難易度 <span class="required-mark">*</span></span>
                <input id="difficulty" name="difficulty" type="hidden" required>
                <div class="difficulty-picker" id="difficultyPicker" aria-invalid="false">
                  <div class="difficulty-tabs" role="group" aria-label="想定難易度の種類">
                    <button class="difficulty-tab" type="button" data-difficulty-mode="symbol" data-symbol="★" aria-pressed="true">★</button>
                    <button class="difficulty-tab" type="button" data-difficulty-mode="symbol" data-symbol="★★" aria-pressed="false">★★</button>
                    <button class="difficulty-tab" type="button" data-difficulty-mode="symbol" data-symbol="sl" aria-pressed="false">sl</button>
                    <button class="difficulty-tab" type="button" data-difficulty-mode="symbol" data-symbol="st" aria-pressed="false">st</button>
                    <button class="difficulty-tab" type="button" data-difficulty-mode="manual" aria-pressed="false">手入力</button>
                  </div>
                  <div class="difficulty-choice-area">
                    <div class="difficulty-chips" id="difficultyChips" role="group" aria-label="想定難易度の数字"></div>
                    <div class="difficulty-manual" id="difficultyManualPanel" hidden>
                      <input id="difficultyManual" type="text" inputmode="text" autocomplete="off" placeholder="例: ★12 / sl10 / 自由入力">
                    </div>
                  </div>
                  <div class="difficulty-preview" aria-live="polite">
                    <span class="difficulty-preview-label">選択中:</span>
                    <span class="difficulty-preview-value" id="difficultyPreview">未選択</span>
                  </div>
                </div>
              </div>

              <label class="field">
                <span class="field-label">差分作者（別名義可） <span class="required-mark">*</span></span>
                <input id="author" name="author" type="text" autocomplete="off" placeholder="例: tester / anonymous" required>
              </label>

              <label class="field">
                <span class="field-label">進捗度 <span class="required-mark">*</span></span>
                <input id="progress" name="progress" type="number" min="0" max="100" step="1" value="100" required>
                <span class="field-help">0〜100の整数。没譜面ON時は100固定です。</span>
              </label>

              <label class="field checkbox-field">
                <input id="isRejected" name="isRejected" type="checkbox" value="true">
                <span class="checkbox-copy">
                  <span class="checkbox-title">没譜面</span>
                  <span class="field-help">追記されることがなくなります。進捗度は100固定です。</span>
                </span>
              </label>

              <label class="field">
                <span class="field-label">管理パスワード <span class="required-mark">*</span></span>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
                <span class="field-help">取り下げ・削除申請に使います。公開されません。忘れると投稿者側で操作できません。</span>
              </label>

              <label class="field checkbox-field save-password-field">
                <input id="savePassword" type="checkbox">
                <span class="checkbox-copy">
                  <span class="checkbox-title">パスワードを保存</span>
                  <span class="field-help">この端末のブラウザに保存します。共有PCでは使わないでください。</span>
                </span>
              </label>

              <label class="field field-wide">
                <span class="field-label">コメント</span>
                <textarea id="comment" name="comment" rows="4" placeholder="音源URL、作業メモ、注意点など"></textarea>
                <span class="field-help">音源ファイルはアップロードせず、音源URLはコメント欄に記入してください。</span>
              </label>
            </div>

            <div class="form-actions">
              <button id="submitButton" type="submit">投稿する</button>
            </div>
          </form>
        </section>

        <section class="list-section" aria-labelledby="listTitle">
          <div class="section-heading">
            <h2 id="listTitle">投稿一覧</h2>
          </div>
          <div class="chart-list" id="chartList"></div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
